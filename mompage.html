<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>우리집 홈쇼핑</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      background-color: white;
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }

    header h1 {
      margin: 0;
    }

    .btn {
      padding: 8px 16px;
      border-radius: 20px;
      border: 1px solid #ccc;
      background-color: white;
      cursor: pointer;
      margin-left: 10px;
    }

    .btn-primary {
      background-color: #2563eb;
      color: white;
      border: none;
    }

    .hero {
      background-color: white;
      margin: 40px;
      padding: 50px;
      text-align: center;
      border-radius: 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }

    .categories {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 40px;
      flex-wrap: wrap;
    }

    .card {
      background-color: white;
      width: 250px;
      padding: 20px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
      transition: transform 0.3s;
    }

    .card .image-row {
      display: flex;
      flex-direction: column;
      gap: 15px;
      margin-bottom: 15px;
    }

    .card .image-box {
      position: relative;
      width: 100%;
    }

    .card .image-box img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-radius: 15px;
    }

    .card .label {
      position: absolute;
      bottom: 8px;
      left: 8px;
      background-color: rgba(0,0,0,0.6);
      color: white;
      padding: 4px 8px;
      font-size: 12px;
      border-radius: 10px;
    }

    

    .card:hover {
      transform: scale(1.05);
    }

    footer {
      text-align: center;
      padding: 30px;
      color: #888;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <header>
    <h1>우리집 홈쇼핑</h1>
    <div>
      <button class="btn">로그인</button>
      <button class="btn btn-primary">장바구니</button>
    </div>
  </header>

  <section class="hero">
    <h2>오늘의 특가 상품을 만나보세요!</h2>
    <p>매일 업데이트되는 인기 상품과 한정 수량 할인 이벤트</p>
    <button class="btn btn-primary">지금 쇼핑하기</button>
  </section>

  <section class="categories">
    <div class="card">
      <div class="image-row">
        <div class="image-box">
          <img src="https://images.unsplash.com/photo-1529139574466-a303027c1d8b" alt="여성 의류 상품 이미지">
          <div class="label">여성</div>
        </div>
        <div class="image-box">
          <img src="https://images.unsplash.com/photo-1516822003754-cca485356ecb" alt="남성 의류 상품 이미지">
          <div class="label">남성</div>
        </div>
      </div>
      <h3>의류</h3>
      <p>여성/남성 의류, 계절별 패션 아이템 특가</p>
      <button class="btn">바로가기</button>
    </div>

    <div class="card">
      <div class="image-box" style="margin-bottom:15px;">
        <img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836" alt="식품 이미지">
      </div>
      <h3>식품</h3>
      <p>신선식품, 간편식, 건강식품까지 한 번에</p>
      <button class="btn">바로가기</button>
    </div>

    <div class="card">
      <div class="image-box" style="margin-bottom:15px;">
        <img src="https://images.unsplash.com/photo-1581578731548-c64695cc6952" alt="생필품 이미지">
      </div>
      <h3>생필품</h3>
      <p>세제, 화장지, 주방용품 등 생활 필수템</p>
      <button class="btn">바로가기</button>
    </div>
  </section>

  <footer>
    © 2026 우리집 홈쇼핑. All rights reserved.
  </footer>

</body>
</html>
