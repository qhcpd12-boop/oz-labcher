
<!-- index.html (포스트 목록 화면) -->
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post List</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            max-width: 800px;
        }
        h1 {
            color: #333;
        }
        ul {
            list-style: none;
            padding: 0;
            cursor: pointer;
        }
      
        li {
            padding: 10px;
            margin: 5px 0;
            background: #f9f9f9;
            border-radius: 5px;
        }
     
        li:hover {
            background: #e0e0e0;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <h1>Post List</h1>
    <ul id="post-list"></ul><!-- 포스트 목록이 여기에 렌더링됨  js가 게시물 목록들 가져옴-->
    <!--<script type="module" src="index.js"></script>< 모듈 방식으로 자바스크립트 파일 로드 -->
    <script src="list.js"></script>
</body>
</html>
