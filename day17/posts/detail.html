<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Detail</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            max-width: 800px;
        }
        h1, h3 {
            color: #333;
        }
        #post-detail {
            padding: 15px;

            display: inline-block;
            margin-top: 20px;

            color: #007bff;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>

<body>
    <h1>Post Detail</h1>
    <div id="post-detail"></div>
     <p>...loding</p><!-- 포스트 상세 정보를 로드하는 동안 사용자에게 표시되는 로딩 메시지.
      초기에는 이 메시지가 보이지만, 포스트 데이터가 성공적으로 로드되면 이 메시지는 post-detail 요소의 innerHTML로<h3>제목</h3><p>내용</p> 대체되어 사라짐. -->
    <!-- 에러 발생 시 JS가 아래 내용으로 덮어씀 -->
