<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>도서 관리 앱</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <h1>📚 도서 관리 앱</h1>

  <div class="book-container">
    
    <!-- 입력 -->
    <input id="bookTitle" class="book-input" type="text" placeholder="도서 제목">
    <input id="bookPrice" class="book-input" type="number" placeholder="가격">

    <!-- 버튼 -->
    <button class="book-button" onclick="addBook()">추가</button>
    <button class="book-button" onclick="processBooks()">도서 처리</button>
    <button class="book-button" onclick="showAllRentalStatus()">대여 상태 보기</button>

    <!-- 리스트 -->
    <ul id="bookList" class="book-list"></ul>

    <!-- 결과 -->
    <div id="results"></div>

  </div>

  <script src="script.js"></script>

</body>
</html>
