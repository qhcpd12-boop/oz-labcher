<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Registration Form</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <h1>User Registration</h1>
  <form id="registration-form" action="#" method="POST">

    <p class="form-group">
      <label for="name">이름:</label>
      <input type="text" id="name" name="name">
    </p>

    <p class="form-group">
      <label for="email">이메일:</label>
      <input type="email" id="email" name="email">
    </p>

    <p class="form-group">
      <label for="password">비밀번호:</label>
      <input type="password" id="password" name="password">
    </p>

    <p class="form-group">
      <label for="birthdate">생년월일:</label>
      <input type="date" id="birthdate" name="birthdate">
    </p>

    <p class="form-group">
      <label for="age">나이:</label>
      <input type="number" id="age" name="age" min="10" max="100">
    </p>

    <p class="form-group">
      <label for="satisfaction">만족도:</label>
      <input type="range" id="satisfaction" name="satisfaction" min="1" max="10">
    </p>

    <p class="form-group">
      <label>성별:</label><br>
      <input type="radio" id="male" name="gender" value="male">
      <label for="male">남성</label>
      <input type="radio" id="female" name="gender" value="female">
      <label for="female">여성</label>
      <input type="radio" id="other" name="gender" value="other">
      <label for="other">그외</label>
    </p>

    <p class="form-group">
      <label>관심사:</label><br>
      <input type="checkbox" id="coding" name="interests" value="coding">
      <label for="coding">코딩</label>
      <input type="checkbox" id="reading" name="interests" value="reading">
      <label for="reading">독서</label>
      <input type="checkbox" id="gaming" name="interests" value="gaming">
      <label for="gaming">게임</label>
    </p>

    <p class="form-group">
      <label for="country">국가:</label>
      <select id="country" name="country">
        <option value="kr">한국</option>
        <option value="us">미국</option>
        <option value="jp">일본</option>
        <option value="cn">중국</option>
        <option value="uk">영국</option>
      </select>
    </p>

    <p class="form-group">
      <button type="submit">Submit</button>
      <button type="reset">Reset</button>
    </p>

  </form>

</body>
</html>
