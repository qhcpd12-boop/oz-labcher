<!doctype html>
<html lang="ko">
  <head>
    <title>User Registration Form</title>
  </head>
  <body>
    <form action="#" method="POST">
        <label for="name">아름</label>
        <input type="text" name="username" placeholder="사용자이름">
        <br>
        <label for="name">비밀번호</label>
        <input type="password" name="password" placeholder="비밀번호">
        <br>
        <div>
        <label for="name">이메일주소</label>
        <input type="email" name="email" placeholder="이메일주소">
        </br>
        </div>
        <div>
        <label for="name">생년월일</label>
         <input type="date" name="date" placeholder="생년월일">
         <br>
         <label for="name">나이</label>
          <input type="number" name="number" placeholder="나이">
          <br>
           <input type="range" name="range" placeholder="만족도">
           </div>
           <br>
           <div>
            <label for="name">성별</label>
            <input type="radio" name="gender" value="Male">남성
            <input type="radio" name="gender" value="Female">여성
           <input type="radio" name="gender" value="Other">그밖의
           </div>
           <div>
           <label for="name">관심사</label>
            <input type="checkbox" name="interst" value="Coding">코딩
            <input type="checkbox" name="interst" value="gaming">게임
            <input type="checkbox" name="interst" value="Reading">독서
           </div>
           <div>
           <label for="name">도시</label>
            <select name="country">
                <option value="South Korea">대한민국</option>
                <option value="USA">미국</option>
                <option value="Japan">일본</option>
                <option value="chaina">중국</option>
                <option value="UK">영국</option>
            </select>
           </div>


        <input type="submit" value="제출"> 
        <input type="reset" value="초기화">
    </form>
  </body>
</html>
